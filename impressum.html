<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impressum — Paul Jennewein</title>
<meta name="description" content="Impressum von Paul Jennewein.">
<link rel="canonical" href="https://pauljennewein.com/impressum.html">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
  @font-face{font-family:'League Spartan';font-style:normal;font-weight:800;font-display:swap;src:url(fonts/league-spartan-800.woff2) format('woff2')}
  @font-face{font-family:'Inter';font-style:normal;font-weight:400;font-display:swap;src:url(fonts/inter-400.woff2) format('woff2')}
  @font-face{font-family:'Inter';font-style:normal;font-weight:600;font-display:swap;src:url(fonts/inter-600.woff2) format('woff2')}
  :root{
    --bg:#FFFFFF;--ink:#111111;--muted:#6A6A6A;--rule:rgba(0,0,0,0.12);
    --head:"League Spartan",Helvetica,Arial,sans-serif;
    --body:"Inter",Helvetica,Arial,sans-serif;--max:720px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{background:var(--bg);color:var(--ink);font-family:var(--body);font-size:17px;line-height:1.6}
  .wrap{max-width:var(--max);margin:0 auto;padding:96px 28px 80px}
  h1{font-family:var(--head);font-weight:800;text-transform:uppercase;
     font-size:clamp(44px,8vw,72px);line-height:.92;margin-bottom:12px}
  .sub{color:var(--muted);font-size:14px;margin-bottom:48px}
  .block{padding:18px 0;border-top:1px solid var(--rule)}
  .block:last-of-type{border-bottom:1px solid var(--rule)}
  .label{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
  a{color:var(--ink)}
  .back{display:inline-block;margin-top:48px;color:var(--muted);text-decoration:none;font-size:15px}
  .back:hover{color:var(--ink)}
  a:focus-visible{outline:2px solid var(--ink);outline-offset:3px;border-radius:4px}
</style>
</head>
<body>
  <main class="wrap">
    <h1>Impressum</h1>
    <p class="sub">Angaben gemäß § 5 ECG und § 25 MedienG</p>

    <div class="block">
      <div class="label">Medieninhaber &amp; für den Inhalt verantwortlich</div>
      Paul Jennewein
    </div>
    <div class="block">
      <div class="label">Anschrift</div>
      Schelleingasse 8<br>1040 Wien<br>Österreich
    </div>
    <div class="block">
      <div class="label">Kontakt</div>
      <a href="mailto:hello@pauljennewein.com">hello@pauljennewein.com</a>
    </div>

    <a class="back" href="/">← Zurück zur Startseite</a>
  </main>
</body>
</html>
